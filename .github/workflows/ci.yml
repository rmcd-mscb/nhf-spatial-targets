name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev

      - name: Check formatting
        run: pixi run -e dev fmt-check

      - name: Lint
        run: pixi run -e dev lint

      - name: Test
        run: pixi run -e dev test
