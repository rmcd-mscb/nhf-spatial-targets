repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  - repo: local
    hooks:
      - id: fmt-check
        name: ruff format check
        entry: pixi run -e dev fmt-check
        language: system
        pass_filenames: false
        types: [python]

      - id: lint
        name: ruff lint
        entry: pixi run -e dev lint
        language: system
        pass_filenames: false
        types: [python]

      # Integration tests excluded by default in `pixi run -e dev test`.
      # Use `pixi run -e dev test-integration` to run them explicitly.
      - id: test
        name: pytest (unit only)
        entry: pixi run -e dev test
        language: system
        pass_filenames: false
        always_run: true
