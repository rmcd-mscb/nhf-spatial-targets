default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
        args: [--keep-id]

  - repo: local
    hooks:
      - id: fmt-check
        name: ruff format check
        entry: pixi run -e dev fmt-check
        language: system
        pass_filenames: false
        types: [python]

      - id: lint
        name: ruff lint
        entry: pixi run -e dev lint
        language: system
        pass_filenames: false
        types: [python]

# Tests are NOT run as a pre-push hook. CI on the PR is the gate before
# merge; the local pre-push test hook had become a time sink as the
# suite grew (~2 min) and was prone to false-failing when the
# pre-commit framework's auto-stash collided with unstaged notebook
# drift. Run `pixi run -e dev test` manually before pushing if you want
# the local feedback.
