# nhf-spatial-targets data source registry
# Each source entry documents origin, access, currency, and known gaps.
# "superseded_by" flags sources from the original NHM calibration that have
# newer versions — resolve before running the pipeline.

sources:

  # ---------------------------------------------------------------------------
  # RUNOFF
  # ---------------------------------------------------------------------------

  era5_land:
    name: ECMWF ERA5-Land Reanalysis
    description: >
      ECMWF ERA5-Land hourly reanalysis. Total runoff (ro), surface runoff
      (sro), sub-surface runoff (ssro), and snow depth water equivalent
      (sd) downloaded for CONUS plus contributing watersheds (Canada/
      Mexico). Used as a source for the runoff calibration target (ro),
      the recharge calibration target (ssro, as drainage proxy), and the
      snow water equivalent calibration target (sd).
    citations:
      - "Muñoz-Sabater, J., and others, 2021, doi:10.5194/essd-13-4349-2021"
    access:
      type: copernicus_cds
      dataset: reanalysis-era5-land
      url: https://cds.climate.copernicus.eu/datasets/reanalysis-era5-land
      bbox_nwse: [53.0, -125.0, 24.7, -66.0]
      bbox_notes: >
        Encompasses CONUS contributing watersheds (Canada/Mexico) with
        ~10 km buffer, snapped to the 0.1° ERA5-Land grid.
      notes: >
        Access via cdsapi (Copernicus CDS account required). Hourly
        accumulated fields reset at 00 UTC; the midnight-reset is handled by
        substituting the raw accumulated value where the diff is negative, then
        shifting timestamps back 1 h before resampling. Pipeline aggregates
        hourly→daily and daily→monthly. Both consolidated NCs are stored in
        the datastore; the daily NC is re-aggregated if any hourly input is
        newer (mtime comparison). Annual downloads are split into 12 monthly
        CDS requests to stay under the CDS per-request cost limit; monthly
        chunk files are retained on disk for idempotent re-runs.
    variables:
      - name: ro
        long_name: total runoff
        cf_units: "m"
        cell_methods: "time: sum"
        notes: Used for runoff target.
      - name: sro
        long_name: surface runoff
        cf_units: "m"
        cell_methods: "time: sum"
        notes: Stored for future use.
      - name: ssro
        long_name: sub-surface runoff
        cf_units: "m"
        cell_methods: "time: sum"
        notes: Used as recharge proxy in recharge target.
      - name: sd
        long_name: snow depth water equivalent
        cf_units: "m"
        cell_methods: "time: point"
        notes: >
          Instantaneous snowpack water equivalent (NOT accumulated like
          ro/sro/ssro). The midnight reset and diff-of-accumulations
          logic that produces the runoff vars does not apply here.
          Hourly→daily consolidation uses .mean() rather than .sum();
          daily→monthly likewise uses .mean(). See
          fetch/era5_land.py `_VARIABLE_KIND` for the dispatch table.
          Used for the snow water equivalent calibration target.
    time_step: hourly (aggregated to daily and monthly)
    period: "1979/present"
    spatial_extent: CONUS+contributing-watersheds
    spatial_resolution: 0.1 degree
    units: m of water equivalent
    license: Copernicus license (free, attribution)
    status: current

  gldas_noah_v21_monthly:
    name: GLDAS-2.1 NOAH Monthly Land Surface Runoff
    description: >
      Global Land Data Assimilation System version 2.1, NOAH land
      surface model, monthly product. Storm surface runoff (Qs_acc)
      and baseflow-groundwater runoff (Qsb_acc) summed at consolidation
      time to derived total runoff (runoff_total). Used as second source
      for the runoff calibration target.
    citations:
      - "Rodell, M., and others, 2004, doi:10.1175/BAMS-85-3-381"
    access:
      type: nasa_gesdisc
      short_name: GLDAS_NOAH025_M
      version: "2.1"
      url: https://disc.gsfc.nasa.gov/datasets/GLDAS_NOAH025_M_2.1/summary
      bbox_nwse: [53.0, -125.0, 24.7, -66.0]
      notes: >
        Access via earthaccess (NASA Earthdata login required). Granules
        are global (~few MB monthly); downloaded full and clipped to bbox
        at consolidation time, mirroring the merra2 pattern.
    variables:
      - name: Qs_acc
        long_name: storm surface runoff
        cf_units: "kg m-2"
        cell_methods: "time: sum"
      - name: Qsb_acc
        long_name: baseflow-groundwater runoff
        cf_units: "kg m-2"
        cell_methods: "time: sum"
      - name: runoff_total
        long_name: total runoff (Qs_acc + Qsb_acc, derived)
        cf_units: "kg m-2"
        cell_methods: "time: sum"
        derived: true
    time_step: monthly
    period: "2000/present"
    spatial_extent: global (clipped to CONUS+contributing-watersheds)
    spatial_resolution: 0.25 degree
    units: kg m-2 (mean of 3-hourly accumulations)
    notes: >
      GLDAS-2.1 monthly products store every variable ending in `_acc`
      (Qs_acc, Qsb_acc, derived runoff_total, etc.) as the *mean* of
      3-hourly accumulations across the month, NOT as a monthly sum, even
      though each carries `cell_methods: time: sum` (which describes the
      underlying 3-hourly value, not the monthly aggregation). To recover
      a monthly total in mm, multiply by `8 × days_in_month`. Per NASA
      GES DISC's GLDAS-2.1 README, this convention applies to all `_acc`
      variables. The runoff target builder (`targets/run.py`) applies the
      conversion in `gldas_to_mm_per_month`.
    license: public domain (NASA)
    status: current

  # ---------------------------------------------------------------------------
  # ACTUAL EVAPOTRANSPIRATION
  # ---------------------------------------------------------------------------
  mod16a2:
    name: MODIS MOD16A2 Global Terrestrial Evapotranspiration
    description: >
      MODIS/Terra Global Terrestrial ET 8-Day L4 Global 500m.
      Used at monthly mean for AET calibration target.
    citations:
      - "Running, S., Mu, Q., Zhao, M. (2017), MOD16A2 v006, LP DAAC"
    access:
      type: lpdaac
      url: https://lpdaac.usgs.gov/products/mod16a2v006/
      notes: v006 superseded by v061. Update URL and product ID for new runs.
    superseded_by: mod16a2_v061
    variables:
      - ET_500m       # kg/m2/8day -> convert to inches/day
      - ET_QC_500m
    time_step: 8-day (aggregate to monthly)
    period: "2000/2010"
    spatial_extent: CONUS
    spatial_resolution: 500m
    units: kg/m2/8day
    status: superseded

  mod16a2_v061:
    name: MODIS MOD16A2 v061 (current version)
    description: Updated version of MOD16A2. Use in place of v006.
    access:
      type: lpdaac
      short_name: MOD16A2GF
      version: "061"
      url: https://lpdaac.usgs.gov/products/mod16a2v061/
    variables:
      - name: ET_500m
        long_name: "actual evapotranspiration"
        cf_units: "kg m-2"
        cell_methods: "time: sum"
      - name: ET_QC_500m
        long_name: "ET quality control"
        cf_units: "1"
    time_step: 8-day (aggregate to monthly)
    period: "2000/present"
    spatial_extent: CONUS
    spatial_resolution: 500m
    units: kg/m2/8day
    license: public domain (NASA)
    status: current
    notes: >
      The previously-reported flat seasonality (Jul/Jan ~ 1.12x in the
      July 2000 cross-check) was an artefact of fill-value contamination
      at the consolidate-time sinusoidal->4km reprojection: rioxarray's
      masked=True only maps the declared _FillValue to NaN, leaving the
      other special codes (water=32761, barren=32762, snow/ice=32763,
      cloudy=32764, no-data=32766) as ordinary numeric pixels that
      Resampling.average then blended with valid neighbours. Fixed in
      PR #88 by masking ET_500m fills *before* reprojection in
      fetch/consolidate.py:_mosaic_and_reproject_timestep. Consolidated
      NCs produced before PR #88 are invalid; re-fetch + re-aggregate
      to recover realistic seasonality. See
      docs/references/lessons-learned.md (MOD16A2 v061 flat-on-CONUS+).

  ssebop:
    name: SSEBop Actual Evapotranspiration
    description: >
      Operational Simplified Surface Energy Balance (SSEBop) AET estimates.
      Used as one of three sources for AET calibration target range.
      Remote dataset accessed via USGS GDP STAC catalog (no local download).
    citations:
      - "Senay, G.B., and others, 2013"
    doi: "10.5066/P9L2YMV"
    access:
      type: usgs_gdp_stac
      collection_id: ssebopeta_monthly
      endpoint: https://usgs.osn.mghpcc.org/
      zarr_store: s3://mdmf/gdp/ssebopeta_monthly.zarr/
    variables:
      - name: et
        long_name: actual evapotranspiration
        cf_units: "mm"
        cell_methods: "time: sum"
        notes: >
          Monthly accumulation of actual ET in mm water-equivalent. The
          source-level ``units: mm/month`` (kept for backwards readability)
          is recovered by combining ``cf_units: mm`` with the time-axis
          aggregation declared in ``cell_methods``.
    time_step: monthly
    period: "2000/2023"
    spatial_extent: CONUS
    spatial_resolution: 1km
    units: mm/month
    status: current

  # ---------------------------------------------------------------------------
  # RECHARGE
  # ---------------------------------------------------------------------------
  reitz2017:
    name: Reitz et al. (2017) Empirical Recharge Estimates
    description: >
      Annual empirical regression-based estimates of groundwater recharge
      for CONUS (the publication also covers runoff and ET, but only total
      and effective recharge are used here). Used as one of two sources for
      the recharge calibration target range (normalized min-max method).
      Targets relative year-to-year change, not absolute magnitude.
    citations:
      - "Reitz, M., Sanford, W.E., Senay, G.B., and Cazenas, J., 2017, doi:10.1111/1752-1688.12546"
      - "Data release: doi:10.5066/F7PN93P0"
    access:
      type: sciencebase
      item_id: "56c49126e4b0946c65219231"
      child_item_id: "55d383a9e4b0518e35468e58"
      doi: "10.5066/F7PN93P0"
      url: https://www.sciencebase.gov/catalog/item/56c49126e4b0946c65219231
      file_patterns:
        total_recharge: "TotalRecharge_{year}.zip"
        eff_recharge: "EffRecharge_{year}.zip"
    variables:
      - name: total_recharge
        file_variable: TotalRecharge
        long_name: total groundwater recharge
        units: m/year
        cf_units: "m yr-1"
        notes: >
          Source GeoTIFFs from the ScienceBase release have no embedded
          units metadata (no Band.GetUnitType, no file/band metadata, no
          PAM .aux.xml sidecar). The ScienceBase landing page documents
          the values as m/year, and CONUS-wide mean (~122 mm/yr) plus
          spot-checks at known-high-recharge locations are consistent
          with that interpretation. Earlier catalog versions declared
          inches/year, which produced values ~8x too low; corrected
          here.
      - name: eff_recharge
        file_variable: EffRecharge
        long_name: effective groundwater recharge (base flow component)
        units: m/year
        cf_units: "m yr-1"
    time_step: annual
    period: "2000/2013"
    spatial_extent: CONUS
    spatial_resolution: 800m raster
    units: m/year
    license: public domain (USGS)
    status: current

  # ---------------------------------------------------------------------------
  # INTEGRATED WATER BALANCE
  # ---------------------------------------------------------------------------
  mwbm_climgrid:
    name: USGS Monthly Water Balance Model (ClimGrid-forced, 2024)
    description: >
      USGS Monthly Water Balance Model (McCabe and Wolock 2011) outputs
      forced by NOAA ClimGrid temperature and precipitation, published
      by Wieczorek et al. (2024). Successor to the retired NHM-MWBM
      (Bock et al. 2017) decommissioned in issue #41. Distributed as a
      single CF-conformant NetCDF covering 1895-01 to 2020-12 monthly,
      CONUS at 2.5 arcminute (~0.042 degree). The 1895-1899 period is
      treated as arbitrary spinup and excluded from `period`.

      Available in the source file but not aggregated by default:
      `pet`, `tmean`, `prcp`, `rain`, `snow`. Add to the `variables:`
      block below and re-run `agg mwbm-climgrid` if needed.
    citations:
      - "Wieczorek, M.E., Signell, R.P., McCabe, G.J., Wolock, D.M., and Norton, P.A., 2024, doi:10.5066/P9QCLGKM"
      - "McCabe, G.J., and Wolock, D.M., 2011 (model)"
    doi: "10.5066/P9QCLGKM"
    access:
      type: sciencebase_manual
      item_id: "64c948dbd34e70357a34c11e"
      url: https://www.sciencebase.gov/catalog/item/64c948dbd34e70357a34c11e
      filename: ClimGrid_WBM.nc
      notes: >
        Single ~7.5 GB NetCDF-4 file, int16-packed with scale_factor /
        add_offset (xarray decodes automatically on open). The
        ScienceBase distribution is gated by a CAPTCHA, so automated
        retrieval via sciencebasepy is not possible — the operator
        must download the file via a browser and place it at
        <datastore>/mwbm_climgrid/ClimGrid_WBM.nc before invoking
        `nhf-targets fetch mwbm-climgrid`, which fingerprints the file
        (size + sha256), validates CF metadata, and records provenance
        in manifest.json. See docs/sources/mwbm_climgrid.md for the
        full procedure. CONUS bounding box; no spatial subsetting.
    variables:
      - name: runoff
        long_name: streamflow per unit area (MWBM)
        cf_units: "mm"
        cell_methods: "time: sum"
      - name: aet
        long_name: actual evapotranspiration (MWBM)
        cf_units: "mm"
        cell_methods: "time: sum"
      - name: soilstorage
        long_name: liquid water content of soil layer (MWBM)
        cf_units: "mm"
        cell_methods: "time: point"
      - name: swe
        long_name: liquid water equivalent of snowpack (MWBM)
        cf_units: "mm"
        cell_methods: "time: point"
    time_step: monthly
    period: "1900/2020"
    spatial_extent: CONUS
    spatial_resolution: 2.5 arcmin (~0.042 degree)
    units: "mm (tmean: degC; not aggregated)"
    license: public domain (USGS)
    status: current

  watergap22a:
    name: WaterGAP 2.2a Global Hydrological Model
    description: >
      Global hydrological model recharge output. Used as second source for
      recharge calibration target range (normalized min-max method).
      Access-gated at time of TM 6-B10; superseded by 2.2d/2.2e.
    citations:
      - "Döll, P., and others, 2014, doi:10.1002/2014WR015595"
    access:
      type: external
      url: https://www.watermodel.net
      notes: >
        Registration-gated. No ScienceBase-hosted copy found.
        Substitute candidate: WaterGAP 2.2d on PANGAEA,
        doi:10.1594/PANGAEA.918447 (open access).
    superseded_by: watergap22d
    variables:
      - groundwater_recharge
    time_step: annual
    period: "1960/2010"
    spatial_extent: global
    spatial_resolution: 0.5 degree
    units: mm/month (normalized to dimensionless for calibration)
    status: superseded_registration_required

  watergap22d:
    name: WaterGAP 2.2d Global Hydrological Model (substitute for 2.2a)
    description: >
      Open-access successor to WaterGAP 2.2a on PANGAEA. Diffuse groundwater
      recharge (Rg) used as one of two sources for the recharge calibration
      target range (normalized min-max method).
    citations:
      - "Müller Schmied, H., and others, 2021, doi:10.5194/gmd-14-1037-2021"
    access:
      type: pangaea
      doi: "10.1594/PANGAEA.918447"
      url: https://doi.pangaea.de/10.1594/PANGAEA.918447
      file: watergap_22d_WFDEI-GPCC_histsoc_qrdif_monthly_1901_2016.nc4
      file_index: 30  # row index in PanDataSet.data for the qrdif NC4 file
    variables:
      - name: groundwater_recharge
        file_variable: qrdif
        long_name: diffuse groundwater recharge
        units: kg m-2 s-1
    time_step: monthly
    period: "1901/2016"
    spatial_extent: global
    spatial_resolution: 0.5 degree
    units: kg m-2 s-1
    license: CC BY-NC 4.0
    status: current

  # ---------------------------------------------------------------------------
  # SOIL MOISTURE
  # ---------------------------------------------------------------------------
  merra_land:
    name: MERRA-Land Soil Moisture
    description: >
      NASA MERRA-Land reanalysis upper-layer soil moisture. Used as one of
      four sources for soil moisture calibration target range in the original
      TM 6-B10 calibration. Targets relative change (normalized), not magnitude.
      DISCONTINUED 2016-02-29 — use merra2 for all new runs.
    citations:
      - "Reichle, R.H., and others, 2011"
    access:
      type: nasa_gmao
      url: https://gmao.gsfc.nasa.gov/reanalysis/MERRA-Land/data
      discontinuation_ref: https://gmao.gsfc.nasa.gov/reanalysis/
      notes: >
        Discontinued 2016-02-29 per GMAO reanalysis documentation.
        Superseded by MERRA-2. Use merra2 source for all new work.
    superseded_by: merra2
    variables:
      - SFMC   # surface soil moisture — variable name from original calibration
    time_step: monthly
    period: "1980/2016-02-29"
    spatial_extent: global
    spatial_resolution: 0.5 x 0.667 degree
    units: m3/m3 (normalized to dimensionless for calibration)
    status: superseded

  merra2:
    name: MERRA-2 Soil Moisture (current replacement for MERRA-Land)
    description: >
      NASA Modern-Era Retrospective analysis for Research and Applications,
      Version 2. Monthly land surface diagnostics (M2TMNXLND). Upper soil
      layer (0-0.05m) moisture used as one of four sources for the soil
      moisture calibration target range.
    citations:
      - "Gelaro, R., and others, 2017, doi:10.1175/JCLI-D-16-0758.1"
      - "Reichle, R.H., and others, 2017, doi:10.1175/JCLI-D-16-0720.1"
    access:
      type: nasa_gesdisc
      short_name: M2TMNXLND
      version: "5.12.4"
      url: https://disc.gsfc.nasa.gov/datasets/M2TMNXLND_5.12.4/summary
      notes: >
        Access via earthaccess (NASA Earthdata login required).
        Download monthly files (global granules); spatial subsetting
        occurs during aggregation, not at download time.
    variables:
      - name: GWETTOP
        long_name: surface_soil_wetness
        layer_depth_m: "0.00-0.05"
        layer_depth_source: "dzsf in M2CONXLND; constant globally at 0.05m"
        units: dimensionless (fraction of saturation, 0-1)
        cf_units: "1"
        preferred: true
        notes: >
          Best variable for comparison with PRMS soil_rechr. Already
          dimensionless so no unit conversion before normalization.
      - name: GWETROOT
        long_name: root_zone_soil_wetness
        layer_depth_m: "0.00-1.00"
        layer_depth_source: "dzrz in M2CONXLND; described as 0-100cm in GMAO FAQ"
        units: dimensionless (fraction of saturation, 0-1)
        cf_units: "1"
        notes: Root zone integrated wetness.
      - name: GWETPROF
        long_name: ave_prof_soil_moisture
        layer_depth_m: spatially varying (surface to bedrock)
        layer_depth_source: "dzpr in M2CONXLND; varies ~1.3-8.5m globally"
        units: dimensionless (fraction of saturation, 0-1)
        cf_units: "1"
        notes: >
          Full profile average soil moisture. Depth extends from surface
          to bedrock and varies spatially per Catchment LSM parameterization.
          Actual thickness available in dzpr variable of M2CONXLND collection.
    layer_depth_notes: >
      Layer thicknesses from NASA Catchment Land Surface Model. Surface layer
      (dzsf) is constant at 0.05m globally. Root zone (dzrz) is 1.00m per
      GMAO FAQ. Profile layer (dzpr) varies spatially (surface to bedrock,
      ~1.3-8.5m range). All thickness fields available in M2CONXLND.
      TM 6-B10 notes magnitudes are not expected to equate across sources —
      normalization makes depth difference irrelevant for calibration.
      References: GMAO MERRA-2 FAQ, Earthdata Forum topic 6156.
    time_step: monthly
    period: "1980/present"
    spatial_extent: global
    spatial_resolution: 0.5 x 0.625 degree
    units: dimensionless (fraction of saturation, 0-1)
    license: public domain (NASA)
    status: current

  ncep_ncar:
    name: NCEP/NCAR Reanalysis Soil Moisture
    description: >
      NOAA/NCEP-NCAR Reanalysis 1 upper-layer soil moisture.
      Used as one of four sources for soil moisture calibration target range.
    citations:
      - "Kalnay, E., and others, 1996, doi:10.1175/1520-0477(1996)077<0437:TNYRP>2.0.CO;2"
    access:
      type: noaa_psl
      url: https://psl.noaa.gov/data/gridded/data.ncep.reanalysis.html
      notes: Monthly means derived from daily Gaussian grid files.
    variables:
      - name: soilw_0_10cm
        file_variable: soilw.0-10cm.gauss
        internal_name: soilw
        file_pattern: "https://downloads.psl.noaa.gov/Datasets/ncep.reanalysis.dailyavgs/surface_gauss/soilw.0-10cm.gauss.{year}.nc"
        long_name: "volumetric soil moisture 0-10 cm"
        layer_depth_m: "0.00-0.10"
        units: m3/m3
        notes: >
          The upstream NCEP/NCAR R1 NetCDFs carry `units: kg/m2` on this
          variable, but the long_name, var_desc, and valid_range
          ([0.0, 1.0]) all confirm the values are volumetric water content
          (m^3/m^3) — a known mislabel in the NCEP R1 GRIB metadata.
          actual_range is ~[0.10, 0.43], consistent with VWC.  Do NOT
          divide by `(layer_depth × ρ_water)` to convert to VWC; the data
          already is VWC.
      - name: soilw_10_200cm
        file_variable: soilw.10-200cm.gauss
        internal_name: soilw
        file_pattern: "https://downloads.psl.noaa.gov/Datasets/ncep.reanalysis.dailyavgs/surface_gauss/soilw.10-200cm.gauss.{year}.nc"
        long_name: "volumetric soil moisture 10-200 cm"
        layer_depth_m: "0.10-2.00"
        units: m3/m3
        notes: "Same upstream `units: kg/m2` mislabel as soilw_0_10cm; values are VWC."
    time_step: monthly (derived from daily)
    period: "1948/present"
    spatial_extent: global
    spatial_resolution: T62 Gaussian grid (~1.875 degree)
    units: m3/m3 (volumetric water content; upstream files mislabel as kg/m2)
    license: public domain (NOAA)
    status: current

  nldas_mosaic:
    name: NLDAS-2 MOSAIC Land Surface Model Soil Moisture
    description: >
      North American Land Data Assimilation System phase 2 (NLDAS-2),
      MOSAIC land surface model output, upper-layer (0-10cm) soil moisture.
      Three soil layers shared with fetch: 0-10cm, 10-40cm, 40-200cm.
    citations:
      - "Xia, Y., and others, 2012, doi:10.1029/2011JD016048"
    access:
      type: nasa_gesdisc
      short_name: NLDAS_MOS0125_M
      version: "2.0"
      url: https://disc.gsfc.nasa.gov/datasets/NLDAS_MOS0125_M_2.0/summary
      notes: Access via earthaccess (NASA Earthdata login required).
    variables:
      - name: SoilM_0_10cm
        long_name: "soil moisture 0-10 cm"
        layer_depth_m: "0.00-0.10"
        units: kg/m2
      - name: SoilM_10_40cm
        long_name: "soil moisture 10-40 cm"
        layer_depth_m: "0.10-0.40"
        units: kg/m2
      - name: SoilM_40_200cm
        long_name: "soil moisture 40-200 cm"
        layer_depth_m: "0.40-2.00"
        units: kg/m2
    time_step: monthly
    period: "1979/present"
    spatial_extent: CONUS
    spatial_resolution: 0.125 degree
    units: kg/m2 (normalized to dimensionless for calibration)
    license: public domain (NASA)
    status: current

  nldas_noah:
    name: NLDAS-2 NOAH Land Surface Model Soil Moisture
    description: >
      North American Land Data Assimilation System phase 2 (NLDAS-2),
      NOAH land surface model output, upper-layer (0-10cm) soil moisture.
      Four soil layers: 0-10cm, 10-40cm, 40-100cm, 100-200cm.
      Note: NOAH uses different layer boundaries than MOSAIC (which has 40-200cm).
    citations:
      - "Xia, Y., and others, 2012, doi:10.1029/2011JD016048"
    access:
      type: nasa_gesdisc
      short_name: NLDAS_NOAH0125_M
      version: "2.0"
      url: https://disc.gsfc.nasa.gov/datasets/NLDAS_NOAH0125_M_2.0/summary
      notes: Access via earthaccess (NASA Earthdata login required).
    variables:
      - name: SoilM_0_10cm
        long_name: "soil moisture 0-10 cm"
        layer_depth_m: "0.00-0.10"
        units: kg/m2
      - name: SoilM_10_40cm
        long_name: "soil moisture 10-40 cm"
        layer_depth_m: "0.10-0.40"
        units: kg/m2
      - name: SoilM_40_100cm
        long_name: "soil moisture 40-100 cm"
        layer_depth_m: "0.40-1.00"
        units: kg/m2
      - name: SoilM_100_200cm
        long_name: "soil moisture 100-200 cm"
        layer_depth_m: "1.00-2.00"
        units: kg/m2
    time_step: monthly
    period: "1979/present"
    spatial_extent: CONUS
    spatial_resolution: 0.125 degree
    units: kg/m2 (normalized to dimensionless for calibration)
    license: public domain (NASA)
    status: current

  # ---------------------------------------------------------------------------
  # SNOW-COVERED AREA
  # ---------------------------------------------------------------------------
  mod10c1:
    name: MODIS MOD10C1 Daily Snow Cover
    description: >
      MODIS/Terra Snow Cover Daily L3 Global 0.05Deg CMG.
      Provides fractional snow cover and confidence interval at 0.05 degree.
      CI threshold of 70% applied; bounds derived from SCA × CI.
    citations:
      - "Hall, D.K., and Riggs, G.A., 2016, doi:10.5067/MODIS/MOD10C1.006"
    access:
      type: nsidc
      url: https://nsidc.org/data/mod10c1
      notes: v006 superseded by v061. Update for new runs.
    superseded_by: mod10c1_v061
    variables:
      - Day_CMG_Snow_Cover    # fractional snow cover 0-100
      - Snow_Spatial_QA       # confidence interval 0-100
    time_step: daily
    period: "2000/2014"  # files cover 2000-2014 per Appendix 1
    spatial_extent: CONUS
    spatial_resolution: 0.05 degree CMG
    units: percent (convert to fraction 0-1)
    ci_threshold: 70
    status: superseded

  mod10c1_v061:
    name: MODIS MOD10C1 v061 (current version)
    description: Updated version of MOD10C1. Use in place of v006.
    access:
      type: nsidc
      short_name: MOD10C1
      version: "061"
      url: https://nsidc.org/data/mod10c1/versions/61
    variables:
      - name: Day_CMG_Snow_Cover
        long_name: "daily snow-covered area"
        cf_units: "percent"
        notes: >
          0-100 = percent of cell with snow.  Source HDF carries flag
          values that must be masked before any quantitative use:
          107=lake ice, 111=night, 237=inland water, 239=ocean,
          250=cloud-obscured water, 253=data not mapped, 255=fill.
          Mask values > 100 to NaN before plotting or aggregation.
      - name: Day_CMG_Clear_Index
        long_name: "daily clear-sky index (% of cell that is cloud-free)"
        cf_units: "percent"
        notes: >
          0-100 = clear-sky percentage of the cell on a given day.
          This is the variable TM 6-B10 calls the "confidence interval"
          for SCA filtering ("a confidence interval equal to 100 percent
          indicates clear sky conditions with the highest level of
          confidence").  Renamed from `Day_CMG_Confidence_Index` in v006.
          Same flag values as Day_CMG_Snow_Cover (mask >100 before use).
      - name: Day_CMG_Cloud_Obscured
        long_name: "daily cloud-obscured percentage"
        cf_units: "percent"
        notes: >
          0-100 = percent of cell obscured by cloud on a given day.
          Complementary to Day_CMG_Clear_Index; kept for QA cross-checks.
          Same flag values as Day_CMG_Snow_Cover.
      - name: Snow_Spatial_QA
        long_name: "categorical QA confidence (0=best ... 4=other)"
        cf_units: "1"
        notes: >
          Source HDF labels this `units: percent` but it is NOT a percent.
          The variable is a categorical QA flag with valid_range 0-4:
          0=best, 1=good, 2=ok, 3=poor, 4=other.  Plus flag values
          237/239/250/252/253/254/255 for water/Antarctica/no-retrieval.
          Do NOT divide by 100 to obtain a "fraction"; the result is
          meaningless.  TM 6-B10 used Day_CMG_Clear_Index for the CI
          filter, not Snow_Spatial_QA.  Kept here for secondary QA only.
    time_step: daily
    period: "2000/present"
    spatial_extent: CONUS
    spatial_resolution: 0.05 degree CMG
    units: percent (convert to fraction 0-1)
    ci_threshold: 70
    license: public domain (NASA)
    status: current

  # ---------------------------------------------------------------------------
  # SNOW WATER EQUIVALENT
  # ---------------------------------------------------------------------------
  daymet:
    name: Daymet V4 R1 Daily Surface Weather and Climatological Summaries
    description: >
      ORNL DAAC Daymet V4 R1 daily 1 km gridded surface weather over
      three regional domains: North America (na), Hawaii (hi), and
      Puerto Rico (pr). Used as a source for the snow water equivalent
      calibration target ('swe'). All six native variables are documented
      below for completeness; only 'swe' is consumed by default.
    citations:
      - "Thornton, M.M., Shrestha, R., Wei, Y., Thornton, P.E., Kao, S.-C., and Wilson, B.E., 2022, doi:10.3334/ORNLDAAC/2129"
    doi: "10.3334/ORNLDAAC/2129"
    access:
      type: zarr_verify
      url: https://daac.ornl.gov/cgi-bin/dsviewer.pl?ds_id=2129
      stores:
        na: "{daymet_root}/daymet_na.zarr"
        hi: "{daymet_root}/daymet_hi.zarr"
        pr: "{daymet_root}/daymet_pr.zarr"
      notes: >
        Three regional zarr stores are pre-staged on the shared filesystem
        (e.g. `/caldera/.../data_creation/daymet/source/zarr/`). The fetch
        module does NOT download or copy data; it verifies each zarr opens
        cleanly, records sha256 of the `.zmetadata` file plus the total
        on-disk byte count, and writes a per-region manifest entry. The
        root path is configurable via `config.yml -> daymet_root` or the
        `--source-path` CLI flag. Operator places the zarrs once; fetch
        is then idempotent (matching fingerprint = no-op).
    variables:
      - name: swe
        long_name: snow water equivalent
        cf_units: "kg m-2"
        cell_methods: "time: point"
        notes: Used for snow water equivalent target.
      - name: prcp
        long_name: daily total precipitation
        cf_units: "kg m-2"
        cell_methods: "time: sum"
        notes: Available in source; not aggregated by default.
      - name: tmax
        long_name: daily maximum 2 m air temperature
        cf_units: "degC"
        cell_methods: "time: maximum"
      - name: tmin
        long_name: daily minimum 2 m air temperature
        cf_units: "degC"
        cell_methods: "time: minimum"
      - name: srad
        long_name: daylight-average shortwave radiation
        cf_units: "W m-2"
        cell_methods: "time: mean"
      - name: vp
        long_name: daily water vapor pressure
        cf_units: "Pa"
        cell_methods: "time: mean"
    time_step: daily
    period: "1980/2024"
    spatial_extent: "North America (NA), Hawaii (HI), Puerto Rico (PR)"
    spatial_resolution: 1 km (Lambert Conformal Conic)
    units: "kg m-2 (swe, prcp); degC (tmax, tmin); W m-2 (srad); Pa (vp)"
    license: public domain (NASA / ORNL DAAC)
    status: current

  snodas:
    name: SNODAS Snow Data Assimilation System Data Products (NSIDC G02158)
    description: >
      NOAA NOHRSC SNODAS daily snow products distributed by NSIDC
      (collection G02158). Daily 1 km CONUS analysis combining
      satellite observations, ground stations, and an energy-balance
      snow model. Used as one source for the SWE calibration target.
    citations:
      - "National Operational Hydrologic Remote Sensing Center, 2004, doi:10.7265/N5TB14TC"
    doi: "10.7265/N5TB14TC"
    access:
      type: nsidc_https
      url: https://nsidc.org/data/g02158
      archive_url: https://noaadata.apps.nsidc.org/NOAA/G02158/masked/
      # CMR collection record (granule-less metadata stub) — kept for
      # provenance and to flag the trap for the next reader; do NOT use
      # earthaccess.search_data on this short_name, it returns 0 hits.
      cmr:
        short_name: G02158
        version: "1"
        concept_id: C1386246263-NSIDCV0
      notes: >
        SNODAS is distributed by NSIDC via an Earthdata-Login-gated
        HTTPS archive at https://noaadata.apps.nsidc.org/NOAA/G02158/.
        The `masked/` subtree (CONUS-trimmed) covers 2003-present, daily
        .tar bundles named SNODAS_YYYYMMDD.tar. Each tar contains flat
        int16 binary fields plus ENVI-style `.Hdr` headers; the SWE
        field is in mm with a fill value of -9999 (scale_factor 1).
        Apply scale + fill mask before any quantitative aggregation.
        IMPORTANT: although a CMR collection record exists
        (concept-id C1386246263-NSIDCV0), CMR holds NO granule-level
        metadata for this product (verified via direct CMR query in
        issue #107). The fetch module constructs URLs from dates and
        downloads through the earthaccess HTTPS auth session rather
        than via earthaccess.search_data. The unmasked variant
        (2009-present, ~60 N to 24.95 N including parts of Canada/
        Mexico) is NOT used. Pre-projection (issue #121): the
        consolidator reprojects from native WGS84 30 arcsec to
        EPSG:5070 (NAD83 / CONUS Albers) at 1000 m using
        nearest-neighbour resampling. Matching the aggregator's
        WEIGHT_GEN_CRS at consolidate time cuts gdptools weight-gen
        cost ~5-8× per batch; nearest-neighbour preserves the -9999
        fill code without bleeding into neighbouring cells.
    variables:
      - name: swe
        long_name: snow water equivalent
        cf_units: "kg m-2"
        cell_methods: "time: point"
        notes: >
          Native SNODAS SWE is a flat int16 field in mm (≡ kg m-2 of
          water at density 1000) with fill value -9999. Apply fill
          mask before any HRU aggregation.
    time_step: daily
    period: "2003/present"
    spatial_extent: CONUS
    spatial_resolution: 1000 m (EPSG:5070, pre-projected at consolidate
      time per issue #121; native 30 arcsec WGS84)
    units: kg m-2 (mm water equivalent)
    license: public domain (NSIDC / NOAA)
    status: current

  margulis_wus_sr:
    name: Margulis Western US Snow Reanalysis (NSIDC-0719)
    description: >
      UCLA/Margulis Western US Snow Reanalysis, daily 90 m posterior
      snow water equivalent over the Sierra Nevada, Cascades, Rockies
      and adjacent ranges for water years 1985-2021. Used as a SWE
      calibration source for the Oregon fabric only; for other fabrics
      the SWE target builder excludes this source (see fabric_scope).
    citations:
      - "Fang, Y., Liu, Y., and Margulis, S.A., 2022, doi:10.5067/PP7T2GBI52I2"
    doi: "10.5067/PP7T2GBI52I2"
    access:
      # `nsidc` = CMR-mediated earthaccess.search_data path (same as
      # MOD10C1). Distinct from `nsidc_https` (SNODAS), where the CMR
      # record is granule-less and the fetch goes direct to the HTTPS
      # archive instead.
      type: nsidc
      short_name: WUS_UCLA_SR
      version: "1"
      url: https://nsidc.org/data/nsidc-0719
      notes: >
        Access via earthaccess (NASA Earthdata login required).
        Granules are per-water-year per-tile NetCDFs covering the
        Western US domain; the fetch module subsets to the fabric
        bounding box at search time. Confirm short_name via an
        earthaccess CMR query at implementation time — historically
        the NSIDC-0719 short_name has been WUS_UCLA_SR but the value
        is subject to NSIDC bookkeeping.
    fabric_scope:
      # `fabrics:` is the list of fabric tokens for which this source
      # should be aggregated. Allowed tokens (kept in sync with the
      # known fabric set this pipeline targets): "or" (Oregon).
      # Token names quoted to avoid YAML reserved-word edge cases.
      fabrics: ["or"]
      notes: >
        Spatial extent is the Western US (CA, OR, WA, ID, NV, UT, and
        parts of MT, WY, CO, AZ, NM). This catalog scopes the source
        to fabric "or" because the SWE target builder is keyed on the
        Oregon HRU set in the current pipeline; enforcement happens at
        target-build time, not at fetch time. Raw downloads remain
        reusable by any project pointing at the same datastore.
    variables:
      - name: SWE
        long_name: posterior snow water equivalent
        cf_units: "m"
        cell_methods: "time: point"
        notes: >
          Posterior SWE in meters water equivalent. Convert to mm
          before harmonisation with the other SWE sources.
    time_step: daily
    period: "1985/2021"
    spatial_extent: Western US (Sierra Nevada, Cascades, Rockies and adjacent ranges)
    spatial_resolution: 90 m
    units: m water equivalent
    license: public domain (NASA NSIDC)
    status: current
