# nhf-spatial-targets calibration variable definitions
# Maps PRMS output variables to their calibration target configuration,
# including which sources contribute and the range calculation method.

variables:

  runoff:
    prms_variable: basin_cfs
    description: >
      Monthly basin mean runoff. Uncertainty bounds pre-computed by MWBM
      post-processing — single source with built-in uncertainty envelope.
    time_step: monthly
    period: "1982/2010"
    units: cfs
    sources:
      - nhm_mwbm
    range_method: mwbm_uncertainty
    range_notes: >
      Upper/lower bounds from Bock et al. (2018) stochastic post-processing
      framework; not a multi-source min/max.
    normalize: false
    output_format: netcdf

  aet:
    prms_variable: hru_actet
    description: >
      Monthly actual evapotranspiration. Range is min/max across three
      independent source datasets for each time step.
    time_step: monthly
    period: "2000/2010"
    units: inches/day
    sources:
      - nhm_mwbm
      - mod16a2       # or mod16a2_v061 for updated runs
      - ssebop
    range_method: multi_source_minmax
    range_notes: >
      For each HRU and time step: lower_bound = min(src1, src2, src3),
      upper_bound = max(src1, src2, src3). All sources must be spatially
      aggregated to HRU polygons before comparison.
    normalize: false
    output_format: netcdf

  recharge:
    prms_variable: recharge
    description: >
      Annual groundwater recharge. Both sources normalized 0-1 over the
      calibration period; optimization targets relative year-to-year change,
      not absolute magnitude.
    time_step: annual
    period: "2000/2009"
    units: dimensionless (normalized)
    original_units: inches/day
    sources:
      - reitz2017
      - watergap22a
    range_method: normalized_minmax
    range_notes: >
      Each source normalized independently to 0-1 over period of record.
      lower_bound = min(norm_src1, norm_src2),
      upper_bound = max(norm_src1, norm_src2).
      NOTE: Appendix 1 of TM 6-B10 implies normalization window may be
      1990-1999 rather than 2000-2009 — verify against Fortran code
      PRMSobjfun.f before production run.
    normalize: true
    normalize_period: "2000/2009"  # verify — may be 1990/1999
    output_format: netcdf

  soil_moisture:
    prms_variable: soil_rechr
    description: >
      Upper capillary reservoir storage (soil_rechr). Four sources normalized
      0-1; optimization targets relative change, not magnitude.
      Monthly normalization applied per calendar month independently.
    time_step:
      - monthly
      - annual
    period: "1982/2010"
    units: dimensionless (normalized)
    original_units: depth (varies by source)
    sources:
      - merra_land    # or merra2 for updated runs
      - ncep_ncar
      - nldas_mosaic
      - nldas_noah
    range_method: normalized_minmax
    range_notes: >
      Annual: normalize each source 0-1 over full period of record.
      Monthly: normalize each source 0-1 per calendar month independently
               (i.e., all Januaries normalized together, etc.)
      lower_bound = min across four sources,
      upper_bound = max across four sources.
      Key gap: upper soil layer variable names differ across products —
      verify SFMC (MERRA), soilw.0-10cm (NCEP), SOILM0-10cm (NLDAS)
      all represent comparable depths relative to PRMS soil_rechr.
    normalize: true
    normalize_by: calendar_month   # for monthly; full period for annual
    output_format: netcdf

  snow_covered_area:
    prms_variable: snowcov_area
    description: >
      Daily fractional snow-covered area. CI-based bounds from MOD10C1.
      Only days with confidence interval > 70% are used.
    time_step: daily
    period: "2000/2010"
    units: fraction (0-1)
    sources:
      - mod10c1    # or mod10c1_v061 for updated runs
    range_method: modis_ci
    range_notes: >
      From MOD10C1: sca = Day_CMG_Snow_Cover / 100,
                    ci  = Snow_Spatial_QA / 100.
      Filter: only use grid cells/days where ci > 0.70.
      Bounds formula: TM 6-B10 implies bounds derived from sca × ci,
      but exact formula not fully specified — verify against PRMSobjfun.f.
    ci_threshold: 0.70
    normalize: false
    output_format: netcdf
