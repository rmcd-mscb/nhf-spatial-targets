# nhf-spatial-targets pipeline configuration
# Controls which targets are built, against which fabric, and for what period.

# ---------------------------------------------------------------------------
# Fabric
# ---------------------------------------------------------------------------
fabric:
  path: data/fabric/gfv1.1_fabric.gpkg   # path relative to project root
  id_col: nhm_id
  crs: EPSG:4326
  # Optional: subset to specific HRU IDs for testing
  # subset_ids: [1, 2, 3]

# ---------------------------------------------------------------------------
# Spatial aggregation (gdptools)
# ---------------------------------------------------------------------------
aggregation:
  engine: gdptools
  method: area_weighted      # area-weighted mean for intensive variables
  output_dir: data/aggregated

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  dir: outputs
  format: netcdf
  compress: true

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:

  runoff:
    enabled: true
    sources:
      - nhm_mwbm
    time_step: monthly
    period: "1982-01-01/2010-12-31"
    prms_variable: basin_cfs
    range_method: mwbm_uncertainty
    output_file: runoff_targets.nc

  aet:
    enabled: true
    sources:
      - nhm_mwbm
      - mod16a2_v061
      - ssebop
    time_step: monthly
    period: "2000-01-01/2010-12-31"
    prms_variable: hru_actet
    range_method: multi_source_minmax
    output_file: aet_targets.nc

  recharge:
    enabled: true
    sources:
      - reitz2017
      - watergap22d
    time_step: annual
    period: "2000-01-01/2009-12-31"
    prms_variable: recharge
    range_method: normalized_minmax
    normalize: true
    normalize_period: "2000-01-01/2009-12-31"   # verify vs Appendix 1
    output_file: recharge_targets.nc

  soil_moisture:
    enabled: true
    sources:
      - merra2
      - ncep_ncar
      - nldas_mosaic
      - nldas_noah
    time_step:
      - monthly
      - annual
    period: "1982-01-01/2010-12-31"
    prms_variable: soil_rechr
    range_method: normalized_minmax
    normalize: true
    normalize_by: calendar_month   # monthly normalization per calendar month
    output_file: soil_moisture_targets.nc

  snow_covered_area:
    enabled: true
    sources:
      - mod10c1_v061
    time_step: daily
    period: "2000-01-01/2010-12-31"
    prms_variable: snowcov_area
    range_method: modis_ci
    ci_threshold: 0.70
    output_file: sca_targets.nc
