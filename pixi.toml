[workspace]
name = "nhf-spatial-targets"
version = "0.1.0"
description = "Curated calibration target datasets for the National Hydrologic Model"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11,<3.14"
pyyaml = ">=6.0"
xarray = ">=2024.1"
numpy = ">=1.26"
pandas = ">=2.0"
geopandas = ">=0.14"
rioxarray = ">=0.15"
netcdf4 = ">=1.6"
h5netcdf = ">=1.3"
dask = ">=2024.1"
cyclopts = ">=3.0"
rich = ">=13.0"
tqdm = ">=4.60"
libgdal-hdf4 = ">=3.12.2,<4"
pangaeapy = ">=1.1.0,<2"
cdsapi = "*"
# gdptools: spatial aggregation (install from PyPI if not on conda-forge)
# sciencebasepy: ScienceBase access
# earthaccess: NASA EDL access for MODIS, MERRA-2, NLDAS

[pypi-dependencies]
nhf-spatial-targets = { path = ".", editable = true }
gdptools = "*"
sciencebasepy = "*"
earthaccess = "*"

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"
ruff = ">=0.4"
mypy = ">=1.10"
ipykernel = ">=6.0"
pre-commit = ">=4.0"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
# Initialise a project.
# Usage: pixi run init -- --project-dir /data/nhf-runs/my-run
init = { cmd = "nhf-targets init", description = "Create a new project skeleton" }

# Validate a project (run after editing config.yml).
# Usage: pixi run validate -- --project-dir /data/nhf-runs/my-run
validate = { cmd = "nhf-targets validate", description = "Validate project config and fabric" }

# Run the full pipeline against a project.
# Usage: pixi run run -- --project-dir /data/nhf-runs/my-run
run = { cmd = "nhf-targets run", description = "Run the full target pipeline" }

# Run individual targets — pass --project-dir as extra arg.
run-runoff = { cmd = "nhf-targets run --target runoff" }
run-aet    = { cmd = "nhf-targets run --target aet" }
run-rch    = { cmd = "nhf-targets run --target recharge" }
run-som    = { cmd = "nhf-targets run --target soil_moisture" }
run-sca    = { cmd = "nhf-targets run --target snow_covered_area" }

# Fetch source data
fetch-merra2 = { cmd = "nhf-targets fetch merra2", description = "Download MERRA-2 data into a project datastore" }
fetch-nldas-mosaic = { cmd = "nhf-targets fetch nldas-mosaic", description = "Download NLDAS-2 MOSAIC data into a project datastore" }
fetch-nldas-noah = { cmd = "nhf-targets fetch nldas-noah", description = "Download NLDAS-2 NOAH data into a project datastore" }
fetch-ncep-ncar = { cmd = "nhf-targets fetch ncep-ncar", description = "Download NCEP/NCAR Reanalysis data into a project datastore" }
fetch-watergap22d = { cmd = "nhf-targets fetch watergap22d", description = "Download WaterGAP 2.2d groundwater recharge from PANGAEA" }
fetch-reitz2017 = { cmd = "nhf-targets fetch reitz2017", description = "Download Reitz 2017 recharge estimates from ScienceBase" }
fetch-mod16a2 = { cmd = "nhf-targets fetch mod16a2", description = "Download MOD16A2 v061 AET data via earthaccess" }
fetch-mod10c1 = { cmd = "nhf-targets fetch mod10c1", description = "Download MOD10C1 v061 snow cover data via earthaccess" }
fetch-all = { cmd = "nhf-targets fetch all", description = "Download all source datasets sequentially" }

# Aggregation
agg-ssebop = { cmd = "nhf-targets agg ssebop", description = "Aggregate SSEBop AET to HRU fabric via STAC" }

# Catalog inspection
catalog-sources   = { cmd = "nhf-targets catalog sources" }
catalog-variables = { cmd = "nhf-targets catalog variables" }

# Development
test  = { cmd = "pytest tests/ -v -m 'not integration'", description = "Run test suite (excludes integration)" }
test-quiet = { cmd = "pytest tests/ -q -m 'not integration'", description = "Run test suite quietly (for pre-commit hooks)" }
test-integration = { cmd = "pytest tests/ -v -m integration", description = "Run integration tests only (requires credentials/network)" }
lint  = { cmd = "ruff check src/ tests/", description = "Lint source" }
fmt   = { cmd = "ruff format src/ tests/", description = "Format source" }
fmt-check = { cmd = "ruff format --check src/ tests/", description = "Check formatting without modifying" }
